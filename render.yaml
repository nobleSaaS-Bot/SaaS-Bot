services:
  - type: web
    name: saasbot-backend
    runtime: python
    rootDir: apps/backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: saasbot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: saasbot-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.12"

  - type: worker
    name: saasbot-worker
    runtime: python
    rootDir: apps
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python worker/worker.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: saasbot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: saasbot-redis
          type: redis
          property: connectionString

  - type: redis
    name: saasbot-redis
    ipAllowList: []
    plan: free

databases:
  - name: saasbot-db
    plan: free
    databaseName: saasbot
    user: saasbot
